        // ----------------------
        // REGISTER USER
        // ----------------------
        async function registerUser() {
            const username = document.getElementById("regUsername").value;
            const file = document.getElementById("regFile").files[0];

            const resultDiv = document.getElementById("regResult");
            resultDiv.textContent = "";

            if (!username || !file) {
                resultDiv.textContent = "⚠️ Username and voice required";
                return;
            }

            const formData = new FormData();
            formData.append("username", username);
            formData.append("file", file);

            try {
                const res = await fetch("/register", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (!res.ok) {
                    resultDiv.textContent = "❌ " + data.error;
                } else {
                    resultDiv.textContent = "✅ Registered successfully!";
                }

            } catch (err) {
                resultDiv.textContent = "Network error: " + err.message;
            }
        }


        // ----------------------
        // LOGIN USER
        // ----------------------
        async function loginUser() {
            const username = document.getElementById("loginUsername").value;
            const file = document.getElementById("loginFile").files[0];

            const resultDiv = document.getElementById("loginResult");
            resultDiv.textContent = "";

            if (!username || !file) {
                resultDiv.textContent = "⚠️ Username and voice required";
                return;
            }

            const formData = new FormData();
            formData.append("username", username);
            formData.append("file", file);

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (!res.ok) {
                    resultDiv.textContent = "❌ " + data.error;
                } else {
                    if (data.authenticated) {
                        resultDiv.textContent = "🟢 Login SUCCESS (distance: " + data.distance.toFixed(4) + ")";
                    } else {
                        resultDiv.textContent = "🔴 Voice NOT MATCHED (distance: " + data.distance.toFixed(4) + ")";
                    }
                }

            } catch (err) {
                resultDiv.textContent = "Network error: " + err.message;
            }
        }
